<!DOCTYPE html>
<html>
<head>
  <title>Pixel forg</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <!-- QR CODE LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1/qrcode.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: white;
      background: black;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: center;
      gap: 50px;
      padding: 20px;
      background: black;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10;
    }

    .nav button {
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      padding: 10px 0;
    }

    .nav button.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: white;
    }

    /* PAGES */
    .page {
      display: none;
      padding-top: 80px;
      text-align: center;
    }

    .show {
      display: block;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(135deg, #0f1020, #1a1b3a, #0b0b0f);
    }

    h1 {
      font-size: 70px;
      margin: 0;
    }

    /* DONATE BUTTON */
    .donate-btn {
      position: fixed;
      right: 20px;
      top: 22px;
      background: white;
      color: black;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: bold;
      z-index: 20;
      border-radius: 6px;
    }

    /* POPUP */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .popup {
      width: 320px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: #111;
      border: 1px solid #333;
      color: white;
      border-radius: 6px;
    }

    #qrcode {
      margin-top: 15px;
      display: flex;
      justify-content: center;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button id="homeBtn" class="active" onclick="showPage('home')">Home</button>
  <button id="gamesBtn" onclick="showPage('games')">Games</button>
  <button id="shopBtn" onclick="showPage('shop')">Shop</button>
</div>

<!-- DONATE -->
<button class="donate-btn" onclick="openDonate()">Donate</button>

<!-- HOME -->
<div id="home" class="page show">
  <div class="hero">
    <h1>Pixel forg</h1>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div class="hero">
    <h1>Games</h1>
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <div class="hero">
    <h1>Shop</h1>
  </div>
</div>

<!-- DONATE POPUP -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="close" onclick="closeDonate()">✕</div>

    <h2>Donate (Swish)</h2>

    <input id="amount" type="number" placeholder="Enter amount (SEK)" oninput="updateQR()" />

    <div id="qrcode"></div>
  </div>
</div>

<script>

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById(page).classList.add('show');

  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(page + "Btn").classList.add('active');
}

/* OPEN / CLOSE */
function openDonate() {
  document.getElementById("overlay").style.display = "flex";
}

function closeDonate() {
  document.getElementById("overlay").style.display = "none";
}

/* SWISH QR */
function updateQR() {
  let amount = document.getElementById("amount").value || 0;

  let swishNumber = "4670XXXXXXX"; // <-- replace with YOUR number

  let link =
    "swish://payment?phone=" +
    swishNumber +
    "&amount=" +
    amount +
    "&message=PixelForge";

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: link,
    width: 180,
    height: 180
  });
}

</script>

</body>
</html>
