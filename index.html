<!DOCTYPE html>
<html>
<head>
  <title>Pixel forg</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: white;
      background: black;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: center;
      gap: 50px;
      padding: 20px;
      background: black;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10;
    }

    .nav button {
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      padding: 10px 0;
    }

    .nav button.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: white;
    }

    /* PAGES */
    .page {
      display: none;
      padding-top: 80px;
      text-align: center;
    }

    .show {
      display: block;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(135deg, #0f1020, #1a1b3a, #0b0b0f);
    }

    h1 {
      font-size: 70px;
      margin: 0;
    }

    /* DONATE BUTTON */
    .donate-btn {
      position: fixed;
      right: 20px;
      top: 22px;
      background: white;
      color: black;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: bold;
      z-index: 20;
      border-radius: 6px;
    }

    /* POPUP */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .popup {
      width: 320px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: #111;
      border: 1px solid #333;
      color: white;
      border-radius: 6px;
    }

    /* SWISH QR IMAGE */
    .qr-box {
      display: none;
      margin-top: 15px;
      opacity: 0;
      transform: scale(0.9);
      transition: 0.25s ease;
    }

    .qr-box.show {
      display: block;
      opacity: 1;
      transform: scale(1);
    }

    .qr-box img {
      width: 200px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button id="homeBtn" class="active" onclick="showPage('home')">Home</button>
  <button id="gamesBtn" onclick="showPage('games')">Games</button>
  <button id="shopBtn" onclick="showPage('shop')">Shop</button>
</div>

<!-- DONATE -->
<button class="donate-btn" onclick="openDonate()">Donate</button>

<!-- HOME -->
<div id="home" class="page show">
  <div class="hero">
    <h1>Pixel forg</h1>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div class="hero">
    <h1>Games</h1>
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <div class="hero">
    <h1>Shop</h1>
  </div>
</div>

<!-- DONATE POPUP -->
<div class="overlay" id="overlay">
  <div class="popup">

    <div class="close" onclick="closeDonate()">✕</div>

    <h2>Donate</h2>

    <select id="method" onchange="updateDonate()">
      <option value="swish">Swish</option>
      <option value="paypal">PayPal</option>
    </select>

    <!-- SWISH QR -->
    <div id="swishBox" class="qr-box show">
      <img src="swishqrcode.png" alt="Swish QR">
    </div>

    <!-- PAYPAL -->
    <div id="paypalBox" class="qr-box">
      <p>PayPal coming soon</p>
    </div>

  </div>
</div>

<script>

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById(page).classList.add('show');

  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(page + "Btn").classList.add('active');
}

/* DONATE OPEN/CLOSE */
function openDonate() {
  document.getElementById("overlay").style.display = "flex";
}

function closeDonate() {
  document.getElementById("overlay").style.display = "none";
}

/* SWITCH METHOD */
function updateDonate() {
  let method = document.getElementById("method").value;

  let swishBox = document.getElementById("swishBox");
  let paypalBox = document.getElementById("paypalBox");

  if (method === "swish") {
    paypalBox.classList.remove("show");
    swishBox.classList.add("show");
  } else {
    swishBox.classList.remove("show");
    paypalBox.classList.add("show");
  }
}

</script>

</body>
</html>
