<script>

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('show');
  });

  document.getElementById(page).classList.add('show');

  document.querySelectorAll('.nav button').forEach(b => {
    b.classList.remove('active');
  });

  document.getElementById(page + "Btn").classList.add('active');
}

function openDonate() {
  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";

  // small delay so animation can trigger properly
  setTimeout(() => {
    overlay.classList.add("show");
  }, 10);
}

function closeDonate() {
  const overlay = document.getElementById("overlay");
  overlay.classList.remove("show");

  setTimeout(() => {
    overlay.style.display = "none";
  }, 200);
}

function updateDonate() {
  let method = document.getElementById("method").value;

  let swishBox = document.getElementById("swishBox");
  let paypalBox = document.getElementById("paypalBox");

  if (method === "swish") {
    paypalBox.classList.remove("show");
    swishBox.classList.add("show");
  } else {
    swishBox.classList.remove("show");
    paypalBox.classList.add("show");
  }
}

// Ensure home page is always correctly initialized
document.addEventListener("DOMContentLoaded", () => {
  showPage("home");
});

</script>
