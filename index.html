<!DOCTYPE html>
<html>
<head>
<title>Pixel Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  color: white;
  background: black;
}

/* ================= NAV ================= */
.nav {
  display: flex;
  justify-content: center;
  gap: 50px;
  padding: 20px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 10;
}

.nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  padding: 10px 0;
}

.nav button.active {
  border-bottom: 2px solid white;
}

/* ================= PAGES ================= */
.page {
  display: none;
  padding-top: 80px;
}

.show {
  display: block;
}

.hero {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(135deg, #0f1020, #1a1b3a, #0b0b0f);
}

h1 {
  font-size: 70px;
  margin: 0;
}

/* ================= GAME CARD ================= */
.game-container {
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.game-card {
  width: 260px;
  background: #0f0f0f;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #2a2a2a;
  cursor: pointer;
}

.game-card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.game-info {
  padding: 14px;
  background: #111;
}

/* ================= DONATE (RESTORED) ================= */
.donate-btn {
  position: fixed;
  right: 20px;
  top: 22px;
  background: white;
  color: black;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
  font-weight: bold;
  z-index: 20;
  border-radius: 6px;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.popup {
  width: 320px;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  position: relative;
}

.close {
  position: absolute;
  top: 8px;
  right: 10px;
  cursor: pointer;
}

/* QR ANIMATION (RESTORED) */
.qr-box {
  margin-top: 15px;
  opacity: 0;
  transform: scale(0.85);
  max-height: 0;
  overflow: hidden;
  transition: all 0.3s ease;
}

.qr-box.show {
  opacity: 1;
  transform: scale(1);
  max-height: 300px;
}

/* ================= GAME OVERLAY ================= */
.game-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: 0.25s ease;
  z-index: 200;
}

.game-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.game-page {
  width: 100%;
  height: 100%;
  display: flex;
  padding: 60px;
  box-sizing: border-box;
}

/* CLOSE */
.close-game {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 26px;
  cursor: pointer;
}

/* LEFT IMAGE */
.game-left {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.game-image {
  height: 80vh;
  border-radius: 14px;
}

/* RIGHT SIDE */
.game-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;

  padding-left: 100px;
}

/* TITLE (MOVED SLIGHTLY RIGHT - YOUR REQUEST) */
.game-title {
  font-size: 70px;
  margin: 0 0 20px 15px; /* 👈 moved right slightly */
}

/* PLAY BUTTON */
.play-button {
  width: 220px;
  padding: 16px 0;

  background: #0a84ff;
  color: white;
  border: none;
  border-radius: 10px;

  font-size: 20px;
  font-weight: bold;
  cursor: pointer;

  margin-bottom: 25px;
}

.play-button:hover {
  background: #3aa0ff;
}

/* TEXT */
.game-desc {
  color: #aaa;
  max-width: 500px;
  line-height: 1.6;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button id="homeBtn" class="active" onclick="showPage('home')">Home</button>
  <button id="gamesBtn" onclick="showPage('games')">Games</button>
  <button id="shopBtn" onclick="showPage('shop')">Shop</button>
</div>

<!-- DONATE -->
<button class="donate-btn" onclick="openDonate()">Donate</button>

<!-- HOME -->
<div id="home" class="page show">
  <div class="hero">
    <h1>Pixel Forge</h1>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div class="hero">

    <div class="game-container">
      <div class="game-card" onclick="openGame('Firegame.png', 'Fire Fight')">
        <img src="Firegame.png">
        <div class="game-info">
          <p>Fire Fight</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <div class="hero">
    <h1>Shop</h1>
  </div>
</div>

<!-- DONATE (FIXED ORIGINAL VERSION) -->
<div class="overlay" id="overlay">
  <div class="popup">

    <div class="close" onclick="closeDonate()">✕</div>

    <h2>Donate</h2>

    <select id="method" onchange="updateDonate()">
      <option value="swish">Swish</option>
      <option value="paypal">PayPal</option>
    </select>

    <div id="swishBox" class="qr-box show">
      <img src="swishqrcode.jpg" width="200">
    </div>

    <div id="paypalBox" class="qr-box">
      <p>PayPal coming soon</p>
    </div>

  </div>
</div>

<!-- GAME -->
<div class="game-overlay" id="gameOverlay" onclick="closeGame(event)">
  <div class="game-page">

    <div class="close-game" onclick="closeGame()">✕</div>

    <div class="game-left">
      <img id="modalImg" class="game-image">
    </div>

    <div class="game-right">

      <h1 class="game-title" id="modalTitle"></h1>

      <button class="play-button">PLAY</button>

      <p class="game-desc"></p>

    </div>

  </div>
</div>

<script>

/* NAV */
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById(page).classList.add('show');

  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(page + "Btn").classList.add("active");
}

/* DONATE */
function openDonate() {
  document.getElementById("overlay").style.display = "flex";
}

function closeDonate() {
  document.getElementById("overlay").style.display = "none";
}

function updateDonate() {
  let m = document.getElementById("method").value;

  document.getElementById("swishBox").classList.remove("show");
  document.getElementById("paypalBox").classList.remove("show");

  setTimeout(() => {
    document.getElementById(m === "swish" ? "swishBox" : "paypalBox").classList.add("show");
  }, 50);
}

/* GAME */
function openGame(img, title) {
  document.getElementById("modalImg").src = img;
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("gameOverlay").classList.add("show");
}

function closeGame(e) {
  if (!e || e.target.id === "gameOverlay" || e.target.classList.contains("close-game")) {
    document.getElementById("gameOverlay").classList.remove("show");
  }
}

</script>

</body>
</html>
