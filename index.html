<!DOCTYPE html>
<html>
<head>
  <title>Pixel forg</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0b0b0f;
      color: white;
    }

    /* TOP NAV */
    .nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
      background: #0b0b0f;
      position: fixed;
      top: 0;
      width: 100%;
    }

    .nav button {
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      padding-bottom: 5px;
    }

    .active {
      border-bottom: 2px solid white;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(135deg, #0f1020, #1a1b3a, #0b0b0f);
      text-align: center;
    }

    h1 {
      font-size: 70px;
      margin: 0;
    }

    /* CONTENT PAGES */
    .page {
      display: none;
      padding-top: 120px;
      text-align: center;
    }

    .show {
      display: block;
    }

    .black {
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button id="homeBtn" class="active" onclick="showPage('home')">Home</button>
  <button id="gamesBtn" onclick="showPage('games')">Games</button>
  <button id="shopBtn" onclick="showPage('shop')">Shop</button>
</div>

<!-- HOME -->
<div id="home" class="page show">
  <div class="hero">
    <h1>Pixel forg</h1>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div class="black">
    <h1>Games</h1>
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <div class="black">
    <h1>Shop</h1>
  </div>
</div>

<script>
  function showPage(page) {
    // hide all pages
    document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));

    // show selected page
    document.getElementById(page).classList.add('show');

    // remove active underline
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));

    // add active underline
    document.getElementById(page + "Btn").classList.add('active');
  }
</script>

</body>
</html>
