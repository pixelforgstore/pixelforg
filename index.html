<!DOCTYPE html>
<html>
<head>
  <title>Pixel forg</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: white;
      background: black;
    }

    /* NAV BAR */
    .nav {
      display: flex;
      justify-content: center;
      gap: 50px;
      padding: 20px;
      background: black;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10;
    }

    .nav button {
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      padding: 10px 0;
    }

    .nav button.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: white;
    }

    /* DONATE BUTTON */
    .donate-btn {
      position: fixed;
      right: 20px;
      top: 22px;
      background: white;
      color: black;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: bold;
      z-index: 20;
      border-radius: 6px;
    }

    /* PAGES */
    .page {
      display: none;
      padding-top: 80px;
      text-align: center;
    }

    .show {
      display: block;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(135deg, #0f1020, #1a1b3a, #0b0b0f);
    }

    h1 {
      font-size: 70px;
      margin: 0;
    }

    /* GAME TILE */
    .game-card {
      width: 220px;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      margin: auto;
      text-align: left;
    }

    .game-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }

    .game-info {
      padding: 10px;
      background: #141414;
    }

    .title {
      font-size: 16px;
    }

    .price {
      font-size: 13px;
      color: #aaa;
      margin-top: 4px;
    }

    /* ===== DONATE POPUP ===== */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .popup {
      width: 300px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      position: relative;
      transform: scale(0.7);
      opacity: 0;
      transition: 0.25s ease;
    }

    .overlay.show .popup {
      transform: scale(1);
      opacity: 1;
    }

    .close {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button id="homeBtn" class="active" onclick="showPage('home')">Home</button>
  <button id="gamesBtn" onclick="showPage('games')">Games</button>
  <button id="shopBtn" onclick="showPage('shop')">Shop</button>
</div>

<!-- DONATE BUTTON -->
<button class="donate-btn" onclick="openDonate()">Donate</button>

<!-- HOME -->
<div id="home" class="page show">
  <div class="hero">
    <h1>Pixel forg</h1>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div class="hero">

    <div class="game-card">
      <img src="YOUR_IMAGE_HERE.jpg" alt="Frogga">

      <div class="game-info">
        <div class="title">Frogga</div>
        <div class="price">Free</div>
      </div>
    </div>

  </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <div class="hero">
    <h1>Shop</h1>
  </div>
</div>

<!-- DONATE POPUP -->
<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    <div class="close" onclick="closeDonate()">✕</div>
    <h2>Donate</h2>
    <p>Support Pixel Forg ❤️</p>
  </div>
</div>

<script>
  function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
    document.getElementById(page).classList.add('show');

    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(page + "Btn").classList.add('active');
  }

  function openDonate() {
    const overlay = document.getElementById("overlay");
    overlay.style.display = "flex";
    setTimeout(() => overlay.classList.add("show"), 10);
  }

  function closeDonate() {
    const overlay = document.getElementById("overlay");
    overlay.classList.remove("show");
    setTimeout(() => overlay.style.display = "none", 200);
  }
</script>

</body>
</html>
