<!DOCTYPE html>
<html>
<head>
<title>Pixel Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  color: white;
  background: black;
}

/* NAV */
.nav {
  display: flex;
  justify-content: center;
  gap: 50px;
  padding: 20px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 10;
}

.nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  position: relative;
  padding: 10px 0;
  transition: opacity 0.2s ease;
}

.nav button:hover {
  opacity: 0.7;
}

.nav button.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 2px;
  background: white;
}

/* PAGES */
.page {
  display: none;
  padding-top: 80px;
  text-align: center;
}

.show {
  display: block;
}

.hero {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(135deg, #0f1020, #1a1b3a, #0b0b0f);
}

h1 {
  font-size: 70px;
  margin: 0;
}

/* DONATE BUTTON */
.donate-btn {
  position: fixed;
  right: 20px;
  top: 22px;
  background: white;
  color: black;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
  font-weight: bold;
  z-index: 20;
  border-radius: 6px;
}

/* POPUP */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.popup {
  width: 320px;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  position: relative;
}

.close {
  position: absolute;
  top: 8px;
  right: 10px;
  cursor: pointer;
  font-size: 18px;
}

select {
  width: 100%;
  padding: 8px;
  margin-top: 10px;
  background: #111;
  border: 1px solid #333;
  color: white;
  border-radius: 6px;
}

/* QR BOX */
.qr-box {
  margin-top: 15px;
  opacity: 0;
  transform: scale(0.85);
  max-height: 0;
  overflow: hidden;
  transition: all 0.3s ease;
}

.qr-box.show {
  opacity: 1;
  transform: scale(1);
  max-height: 300px;
}

.qr-box img {
  width: 200px;
  border-radius: 10px;
}

/* GAME CARD */
.game-container {
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.game-card {
  width: 260px;
  background: #121212;
  border-radius: 12px;
  overflow: hidden;
  text-align: left;
  border: 1px solid #2a2a2a;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.game-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(255,255,255,0.08);
}

.game-card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.game-info {
  padding: 12px;
}

.game-title {
  font-size: 18px;
  margin: 0;
}

.game-price {
  font-size: 14px;
  color: #aaa;
  margin-top: 4px;
}

/* ========================= */
/* GAME MODAL */
/* ========================= */

.game-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  z-index: 200;
}

.game-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.game-modal {
  position: relative;
  width: 500px;
  max-width: 90%;
  border-radius: 14px;
  overflow: hidden;

  transform: scale(0.85);
  transition: transform 0.25s ease;
}

.game-overlay.show .game-modal {
  transform: scale(1);
}

.game-modal img {
  width: 100%;
  display: block;
}

/* PLAY BUTTON */
.play-button {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  color: white;
  background: rgba(0,0,0,0.4);
  width: 90px;
  height: 90px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease;
}

.play-button:hover {
  transform: translate(-50%, -50%) scale(1.1);
  background: rgba(0,0,0,0.6);
}

/* CLOSE BUTTON */
.close-game {
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 20px;
  color: white;
  cursor: pointer;
  z-index: 10;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button id="homeBtn" class="active" onclick="showPage('home')">Home</button>
  <button id="gamesBtn" onclick="showPage('games')">Games</button>
  <button id="shopBtn" onclick="showPage('shop')">Shop</button>
</div>

<!-- DONATE -->
<button class="donate-btn" onclick="openDonate()">Donate</button>

<!-- HOME -->
<div id="home" class="page show">
  <div class="hero">
    <h1>Pixel Forge</h1>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div class="hero">

    <div class="game-container">
      <div class="game-card" onclick="openGame('Firegame.png')">
        <img src="Firegame.png" alt="Fire Game">
        <div class="game-info">
          <p class="game-title">FireFight</p>
          <p class="game-price">Free</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <div class="hero">
    <h1>Shop</h1>
  </div>
</div>

<!-- DONATE -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="close" onclick="closeDonate()">✕</div>

    <h2>Donate</h2>

    <select id="method" onchange="updateDonate()">
      <option value="swish">Swish</option>
      <option value="paypal">PayPal</option>
    </select>

    <div id="swishBox" class="qr-box show">
      <img src="swishqrcode.jpg" alt="Swish QR">
    </div>

    <div id="paypalBox" class="qr-box">
      <p>PayPal coming soon</p>
    </div>
  </div>
</div>

<!-- GAME MODAL -->
<div class="game-overlay" id="gameOverlay" onclick="closeGame(event)">
  <div class="game-modal">
    <div class="close-game" onclick="closeGame()">✕</div>
    <img id="modalImg" src="" alt="Game Preview">

    <div class="play-button">
      ▶
    </div>
  </div>
</div>

<script>

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById(page).classList.add('show');

  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(page + "Btn");
  if (btn) btn.classList.add("active");
}

/* DONATE */
function openDonate() {
  document.getElementById("overlay").style.display = "flex";
}

function closeDonate() {
  document.getElementById("overlay").style.display = "none";
}

function updateDonate() {
  let method = document.getElementById("method").value;

  document.getElementById("swishBox").classList.remove("show");
  document.getElementById("paypalBox").classList.remove("show");

  setTimeout(() => {
    if (method === "swish") {
      document.getElementById("swishBox").classList.add("show");
    } else {
      document.getElementById("paypalBox").classList.add("show");
    }
  }, 50);
}

/* GAME MODAL */
function openGame(imgSrc) {
  document.getElementById("modalImg").src = imgSrc;
  document.getElementById("gameOverlay").classList.add("show");
}

function closeGame(e) {
  if (!e || e.target.id === "gameOverlay" || e.target.classList.contains("close-game")) {
    document.getElementById("gameOverlay").classList.remove("show");
  }
}

</script>

</body>
</html>
