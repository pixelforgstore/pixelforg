<!DOCTYPE html>
<html>
<head>
  <title>Pixel forg</title>

  <!-- Cool font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0b0b0f;
      color: white;
    }

    /* Top hero section */
    .hero {
      height: 60vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      /* cool gradient background */
      background: linear-gradient(
        135deg,
        #0f1020,
        #1a1b3a,
        #0b0b0f
      );
    }

    h1 {
      font-size: 64px;
      margin: 0;
      letter-spacing: 3px;
    }

    p {
      margin-top: 10px;
      color: #bbbbbb;
    }

    /* future game section */
    .content {
      padding: 40px;
      text-align: center;
    }

    .card {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #333;
      border-radius: 12px;
      display: inline-block;
      background: #151525;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Pixel forg</h1>
    <p>Indie 2D & pixel games coming soon</p>
  </div>

  <div class="content">
    <h2>🔥 My Games</h2>

    <div class="card">
      <p>No games yet — but something cool is coming 👀</p>
    </div>
  </div>

</body>
</html>
