<!DOCTYPE html>
<html>
<head>
<title>Pixel Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  color: white;
  background: black;
}

/* ================= NAV ================= */
.nav {
  display: flex;
  justify-content: center;
  gap: 50px;
  padding: 20px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 10;
}

.nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  padding: 10px 0;
}

.nav button.active {
  border-bottom: 2px solid white;
}

/* ================= PAGES ================= */
.page {
  display: none;
  padding-top: 80px;
}

.show {
  display: block;
}

.hero {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(135deg, #0f1020, #1a1b3a, #0b0b0f);
}

h1 {
  font-size: 70px;
  margin: 0;
}

/* ================= GAME CARD ================= */
.game-container {
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.game-card {
  width: 260px;
  background: #121212;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #2a2a2a;
  cursor: pointer;
}

.game-card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.game-info {
  padding: 12px;
}

/* ================= DONATE ================= */
.donate-btn {
  position: fixed;
  right: 20px;
  top: 22px;
  background: white;
  color: black;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
  font-weight: bold;
  z-index: 20;
  border-radius: 6px;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.popup {
  width: 320px;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  position: relative;
}

.close {
  position: absolute;
  top: 8px;
  right: 10px;
  cursor: pointer;
}

/* ================= GAME MODAL (EPIC STYLE) ================= */
.game-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: 0.25s ease;
  z-index: 200;
}

.game-overlay.show {
  opacity: 1;
  pointer-events: all;
}

/* BIG DARK PANEL */
.game-panel {
  width: 850px;
  max-width: 95%;
  background: #0f0f0f;
  border-radius: 18px;
  padding: 30px;
  position: relative;

  transform: scale(0.95);
  transition: 0.25s ease;
}

.game-overlay.show .game-panel {
  transform: scale(1);
}

/* CLOSE */
.close-game {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 22px;
  cursor: pointer;
  opacity: 0.8;
}

/* SMALLER IMAGE (IMPORTANT) */
.game-banner {
  width: 60%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
  display: block;
  margin: 0 auto;
}

/* PLAY BUTTON (ONLY ONE, UNDER IMAGE) */
.play-btn {
  display: block;
  margin: 20px auto 10px auto;

  background: white;
  color: black;
  border: none;

  padding: 14px 40px;
  font-size: 16px;
  font-weight: bold;

  border-radius: 8px;
  cursor: pointer;

  transition: transform 0.2s ease;
}

.play-btn:hover {
  transform: scale(1.05);
}

/* TEXT AREA */
.game-content {
  margin-top: 20px;
  padding: 10px 40px 30px 40px;
}

.game-title-big {
  font-size: 28px;
  margin-bottom: 10px;
}

.game-text {
  color: #aaa;
  font-size: 15px;
  line-height: 1.6;
  min-height: 180px;
}

/* QR animation */
.qr-box {
  margin-top: 15px;
  opacity: 0;
  transform: scale(0.85);
  max-height: 0;
  overflow: hidden;
  transition: all 0.3s ease;
}

.qr-box.show {
  opacity: 1;
  transform: scale(1);
  max-height: 300px;
}

.qr-box img {
  width: 200px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button id="homeBtn" class="active" onclick="showPage('home')">Home</button>
  <button id="gamesBtn" onclick="showPage('games')">Games</button>
  <button id="shopBtn" onclick="showPage('shop')">Shop</button>
</div>

<!-- DONATE -->
<button class="donate-btn" onclick="openDonate()">Donate</button>

<!-- HOME -->
<div id="home" class="page show">
  <div class="hero">
    <h1>Pixel Forge</h1>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div class="hero">

    <div class="game-container">
      <div class="game-card" onclick="openGame('Firegame.png', 'FireFight')">
        <img src="Firegame.png">
        <div class="game-info">
          <p>FireFight</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <div class="hero">
    <h1>Shop</h1>
  </div>
</div>

<!-- DONATE -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="close" onclick="closeDonate()">✕</div>

    <h2>Donate</h2>

    <select id="method" onchange="updateDonate()">
      <option value="swish">Swish</option>
      <option value="paypal">PayPal</option>
    </select>

    <div id="swishBox" class="qr-box show">
      <img src="swishqrcode.jpg">
    </div>

    <div id="paypalBox" class="qr-box">
      <p>PayPal coming soon</p>
    </div>
  </div>
</div>

<!-- GAME MODAL -->
<div class="game-overlay" id="gameOverlay" onclick="closeGame(event)">
  <div class="game-panel">

    <div class="close-game" onclick="closeGame()">✕</div>

    <img id="modalImg" class="game-banner">

    <button class="play-btn">PLAY</button>

    <div class="game-content">
      <div class="game-title-big" id="modalTitle"></div>

      <div class="game-text">
        <!-- later text -->
      </div>
    </div>

  </div>
</div>

<script>

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById(page).classList.add('show');

  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(page + "Btn").classList.add("active");
}

/* DONATE */
function openDonate() {
  document.getElementById("overlay").style.display = "flex";
}

function closeDonate() {
  document.getElementById("overlay").style.display = "none";
}

function updateDonate() {
  let m = document.getElementById("method").value;

  document.getElementById("swishBox").classList.remove("show");
  document.getElementById("paypalBox").classList.remove("show");

  setTimeout(() => {
    document.getElementById(m === "swish" ? "swishBox" : "paypalBox").classList.add("show");
  }, 50);
}

/* GAME MODAL */
function openGame(img, title) {
  document.getElementById("modalImg").src = img;
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("gameOverlay").classList.add("show");
}

function closeGame(e) {
  if (!e || e.target.id === "gameOverlay" || e.target.classList.contains("close-game")) {
    document.getElementById("gameOverlay").classList.remove("show");
  }
}

</script>

</body>
</html>
