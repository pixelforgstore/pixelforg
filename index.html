<!DOCTYPE html>
<html>
<head>
  <title>Pixel forg</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: white;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
      position: fixed;
      width: 100%;
      top: 0;
      background: black;
    }

    .nav button {
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    /* PAGES */
    .page {
      display: none;
      padding-top: 100px;
      text-align: center;
    }

    .show {
      display: block;
    }

    /* HOME HERO ONLY (small background area) */
    .hero {
      margin: 80px auto 0;
      width: 100%;
      max-width: 900px;
      padding: 80px 20px;
      border-radius: 20px;

      background: linear-gradient(135deg, #0f1020, #1a1b3a, #0b0b0f);
    }

    h1 {
      font-size: 70px;
      margin: 0;
    }

    .simple {
      font-size: 30px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('games')">Games</button>
  <button onclick="showPage('shop')">Shop</button>
</div>

<!-- HOME -->
<div id="home" class="page show">
  <div class="hero">
    <h1>Pixel forg</h1>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
  <div class="simple">Games</div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <div class="simple">Shop</div>
</div>

<script>
  function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
    document.getElementById(page).classList.add('show');
  }
</script>

</body>
</html>
