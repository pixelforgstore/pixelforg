<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Forge</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* TOP BAR */
.nav {
    display: flex;
    justify-content: center;
    gap: 50px;
    background: black;
    padding: 20px 0;
    position: relative;
}

.nav button {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    position: relative;
    padding-bottom: 10px;
}

/* underline for active page */
.nav button.active::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 3px;
    background: white;
}

/* HERO HOME */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 70px;
    margin: 0;
    font-weight: bold;
}

/* GAMES GRID */
.games {
    display: none;
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.game-card {
    background: #1c1c1c;
    padding: 10px;
    border-radius: 10px;
}

.game-card img {
    width: 100%;
    border-radius: 10px;
}

.game-title {
    margin-top: 10px;
    font-size: 16px;
}

.price {
    color: #00ff88;
}

/* SHOP / HOME / GAMES PAGES */
.page {
    display: none;
}

.page.active {
    display: block;
}
</style>
</head>
<body>

<div class="nav">
    <button class="active" onclick="showPage('home', this)">Home</button>
    <button onclick="showPage('games', this)">Games</button>
    <button onclick="showPage('shop', this)">Shop</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
    <div class="hero">
        <h1>Pixel Forge</h1>
    </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
    <div class="games">
        <div class="game-card">
            <img src="https://via.placeholder.com/300x180" alt="">
            <div class="game-title">Cool Game 1</div>
            <div class="price">$9.99</div>
        </div>

        <div class="game-card">
            <img src="https://via.placeholder.com/300x180" alt="">
            <div class="game-title">Cool Game 2</div>
            <div class="price">$14.99</div>
        </div>

        <div class="game-card">
            <img src="https://via.placeholder.com/300x180" alt="">
            <div class="game-title">Cool Game 3</div>
            <div class="price">$4.99</div>
        </div>
    </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
    <div class="hero">
        <h1>Shop</h1>
    </div>
</div>

<script>
function showPage(page, btn) {
    // pages
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');

    // buttons underline
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
</script>

</body>
</html>
