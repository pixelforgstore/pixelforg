<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Forge</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* NAV BAR */
.nav {
    display: flex;
    justify-content: center;
    gap: 50px;
    background: black;
    padding: 20px 0;
}

.nav button {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    position: relative;
    padding-bottom: 8px;
}

/* underline only active page */
.nav button.active::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 3px;
    background: white;
}

/* PAGES */
.page {
    display: none;
}

.page.active {
    display: block;
}

/* HOME */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 70px;
    margin: 0;
}

/* GAMES */
.games-wrap {
    padding: 40px;
}

.game-card {
    width: 200px;
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
}

.game-card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

.game-info {
    padding: 10px;
    background: #151515;
}

.game-title {
    font-size: 16px;
}

.game-price {
    font-size: 13px;
    color: #aaa;
    margin-top: 4px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <button class="active" onclick="showPage('home', this)">Home</button>
    <button onclick="showPage('games', this)">Games</button>
    <button onclick="showPage('shop', this)">Shop</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
    <div class="hero">
        <h1>Pixel Forge</h1>
    </div>
</div>

<!-- GAMES -->
<div id="games" class="page">
    <div class="games-wrap">

        <div class="game-card">
            <!-- REPLACE THIS IMAGE WITH YOUR OWN -->
            <img src="YOUR_IMAGE_HERE.jpg" alt="game image">

            <div class="game-info">
                <div class="game-title">Frogga</div>
                <div class="game-price">Free</div>
            </div>
        </div>

    </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
    <div class="hero">
        <h1>Shop</h1>
    </div>
</div>

<script>
function showPage(page, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');

    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
</script>

</body>
</html>
